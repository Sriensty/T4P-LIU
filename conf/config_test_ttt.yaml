defaults:
  - hydra: default
  - datamodule: lyft_lyftsample
  - model: model_ttt

seed: 1234
monitor: val/loss     
save_top_k: 10

data_root:
checkpoint: 
pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-26/16-35-23_Nofurmae_tr_nus_vl_nus/checkpoints/epoch=23.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-26/15-29-12_Nofurmae_tr_nus_vl_nus/checkpoints/epoch=25.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-09-21/18-23-05_tr_nus_val_nus/checkpoints/epoch=33.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-09-22/15-47-52_tr_lyft_val_lyftsample/checkpoints/epoch=55.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-03/16-31-05_tr_way_val_way/checkpoints/epoch=49.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-04/16-06-29_tr_inter_vl_inter_13/checkpoints/epoch=50.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-04/23-09-25_tr_lyft_vl_lyftsample_13/checkpoints/epoch=11.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-16/21-07-25_tr_nus_vl_nus_13/checkpoints/epoch=34.ckpt
# pretrained_weights: outputs/forecast-mae-ttt-test_False/2023-10-17/19-50-14_tr_way03_vl_way001_13/checkpoints/epoch=21.ckpt
output: ${model.name}-${model.phase}

# trainer
num_workers: 4
gpus: 1
sync_bn: true
batch_size: 1
epochs: 60
warmup_epochs: 10

# optimizer
# lr: 0.01
# weight_decay: 1e-3
# lr2: 0.5
# weight_decay2: 1e-3
# gradient_clip_val: 15
lr: 0.0001
weight_decay: 1e-3
lr2: 0.01
weight_decay2: 1e-3
gradient_clip_val: 15
gradient_clip_algorithm: norm
blacklist: [
            
            ]
whitelist: [
            Embedding,
            Linear,
            Conv1d,
            Conv2d,
            Conv3d,
            MultiheadAttention,
            LSTM,
            GRU,
            BatchNorm1d,
            BatchNorm2d,
            BatchNorm3d,
            SyncBatchNorm,
            LayerNorm,
            ]
update_param: True

fr_embedding: False
fr_first_layer: False
fr_enc_layer: False
fr_dec_layer: False
fr_last_fore: False
fr_last_mae: False

sep_ego: False
update_type_embed: False

limit_train_batches:
limit_val_batches:
limit_test_batches:
log_model: all
test: true
# ttt_frequency: 30
ttt_frequency: 12
ttt_real_freq: 1

log_frequency: 50

wandb: disable

save_adapted: false

# ---- Anti-forgetting (LwF) ----
# 0.0 = no LwF (vanilla T4P).  Start with 0.3 for short-term, 0.5–1.0 for long.
lwf_weight: 0.0
# Distillation on mode probability pi; keep small. 0.05 is a good first try.
lwf_pi_weight: 0.0

# ---- Feature-level LwF (new) ----
# Distill on encoder features instead of/in addition to trajectory outputs.
# Idea: constrain "domain understanding" not "specific trajectory" — allows
# target adaptation while preserving source scene understanding.
# Start with lwf_feature_agent_weight=0.3, lwf_feature_lane_weight=0.1.
lwf_feature_agent_weight: 0.0   # ego deep feature distill (main knob)
lwf_feature_lane_weight: 0.0    # lane token distill (auxiliary)

# ---- Long-horizon supervision weighting ----
# Per-step loss weight = floor + gamma * (t / T), then mean-normalized.
# gamma=0 keeps the original uniform weighting (no behavior change).
# Recommended starting values for long-term: gamma=2.0, floor=1.0
long_horizon_gamma: 0.0
long_horizon_floor: 1.0

# ---- GRPO anti-forgetting (alternative to LwF) ----
use_grpo: false
grpo_reward: obs_ade      # "obs_ade" | "ade" | "fde"
grpo_kl_beta: 0.1         # KL penalty weight (mode distribution)
grpo_feat_beta: 0.0       # feature anchor weight (x_agent MSE, 0=disabled)

desc: Ours_obs_tr_way_val_lyftsample_wo_actor_spec
