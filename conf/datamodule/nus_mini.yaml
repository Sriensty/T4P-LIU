_target_: datamodule.trajdata_datamodule.TrajdataDataModule

train_args:
  - data: [nusc_mini-mini_train]
  - data_dir: {'nusc_mini': 'datasets/nuScenes/nuscene_mini'}
  - dt: 0.5
  - history: [2., 2.]
  - future: [6., 6.]
  - ego_only: True
  - bs: ${batch_size}
val_args:
  - data: [nusc_mini-mini_val]
  - data_dir: {'nusc_mini': 'datasets/nuScenes/nuscene_mini'}
  - dt: 0.5
  - history: [2., 2.]
  - future: [6., 6.]
  - ego_only: True
  - bs: ${batch_size}
test_args:
  - data: [nusc_mini-mini_val]
  - data_dir: {'nusc_mini': 'datasets/nuScenes/nuscene_mini'}
  - dt: 0.5
  - history: [2., 2.]
  - future: [6., 6.]
  - ego_only: True
  - bs: ${batch_size}
shuffle: True
augmentations: null
num_workers: ${num_workers}
pin_memory: True
test: ${test}
